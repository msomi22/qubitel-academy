  <head>
    <meta charset="UTF-8" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": ["WebSite", "Organization"],
        "name": "Qubitel Academy",
        "alternateName": "Qubitel Learning Academies",
        "url": "https://academy.qubitel.net/",
        "description": "Qubitel Academy hosts focused learning academies for technology, curriculum practice, customer experience, and professional skills.",
        "keywords": [
          "Qubitel Academy",
          "learning academy",
          "technology learning",
          "curriculum practice",
          "CBC exam practice",
          "customer experience",
          "professional skills"
        ]
      }
    </script>

    <!-- START TEMP TV DEBUG OVERLAY: remove after LG TV browser investigation -->
    <script>
      (function () {
        function getParam(name) {
          try {
            var search = window.location.search || '';
            var query = search.charAt(0) === '?' ? search.substring(1) : search;
            var parts = query.split('&');

            for (var i = 0; i < parts.length; i += 1) {
              var pair = parts[i].split('=');
              var key = decodeURIComponent(pair[0] || '');
              var value = decodeURIComponent(pair[1] || '');

              if (key === name) {
                return value;
              }
            }
          } catch (error) {
            return '';
          }

          return '';
        }

        function renderTvDebug(title, details) {
          try {
            var existing = document.getElementById('tv-debug-overlay');

            if (existing && existing.parentNode) {
              existing.parentNode.removeChild(existing);
            }

            var wrapper = document.createElement('div');
            wrapper.id = 'tv-debug-overlay';

            wrapper.style.position = 'fixed';
            wrapper.style.left = '0';
            wrapper.style.top = '0';
            wrapper.style.right = '0';
            wrapper.style.bottom = '0';
            wrapper.style.zIndex = '2147483647';
            wrapper.style.background = '#111827';
            wrapper.style.color = '#ffffff';
            wrapper.style.overflow = 'auto';
            wrapper.style.padding = '16px';
            wrapper.style.boxSizing = 'border-box';
            wrapper.style.fontFamily = 'Arial, sans-serif';
            wrapper.style.textAlign = 'left';

            heading.style.fontSize = '20px';
            heading.style.fontWeight = '700';
            heading.style.marginBottom = '12px';

            body.style.whiteSpace = 'pre-wrap';
            body.style.fontSize = '14px';
            body.style.lineHeight = '1.35';
            body.style.margin = '0';
            body.style.maxWidth = '100%';
            body.style.wordBreak = 'break-word';

            wrapper.appendChild(heading);
            wrapper.appendChild(body);

            document.body.appendChild(wrapper);
          } catch (error) {
            try {
              document.body.textContent = 'TV debug render failed: ' + String(error);
            } catch (_) {
              // Ignore.
            }
          }
        }

        function enableTvDebug() {
          var enabled = getParam('tvDebug') === 'true';

          if (!enabled) {
            return;
          }

          window.__TV_DEBUG_ENABLED__ = true;

          function showInitialMessage() {
            renderTvDebug(
              'TV Debug Loaded',
              [
                'The tvDebug flag is working.',
                '',
                'This message is rendered from index.html before React/Vite starts.',
                '',
                'If this stays on screen, the HTML loads but the app bundle may not be starting.',
                '',
                'URL:',
                String(window.location.href),
                '',
                'User Agent:',
                String(window.navigator && window.navigator.userAgent ? window.navigator.userAgent : 'Unknown')
              ].join('\n')
            );
          }

          if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', showInitialMessage);
          } else {
            showInitialMessage();
          }

          window.onerror = function (message, source, lineno, colno, error) {
            renderTvDebug(
              'TV Runtime Error',
              [
                'Message:',
                String(message),
                '',
                'Source:',
                String(source || ''),
                '',
                'Line: ' + String(lineno) + ', Column: ' + String(colno),
                '',
                'Stack:',
                error && error.stack ? String(error.stack) : ''
              ].join('\n')
            );
          };

          window.onunhandledrejection = function (event) {
            var reason = event && event.reason ? event.reason : 'Unknown rejection';

            renderTvDebug(
              'TV Promise Rejection',
              [
                'Reason:',
                reason && reason.message ? String(reason.message) : String(reason),
                '',
                'Stack:',
                reason && reason.stack ? String(reason.stack) : ''
              ].join('\n')
            );
          };

          window.__showTvDebug = renderTvDebug;
        }

        enableTvDebug();
      })();
    </script>
    <!-- END TEMP TV DEBUG OVERLAY: remove after LG TV browser investigation -->
  </head>

  <body>
    <div id="root"></div>
      <script
      type="module"
      src="/src/main.jsx"
      onerror="window.__showTvDebug && window.__showTvDebug('TV Module Load Error', 'The React/Vite module script failed to load or execute. This often means the TV browser does not support the modern module bundle.')"
    >
    </script>

    <noscript>
      <div style="padding: 32px; font-size: 22px; color: white; background: #111827; min-height: 100vh;">
        JavaScript is required to run Qubitel Academy.
      </div>
    </noscript>
  </body>
</html>
